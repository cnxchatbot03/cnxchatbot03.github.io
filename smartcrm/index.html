                    .select('role')

                    .maybeSingle();

                    renderAccessDenied(profile);
                    return;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');

        function switchDashboardChart(mode) {
            const btnDay = document.getElementById('btn-chart-daily');
            const btnMon = document.getElementById('btn-chart-monthly');
            if (!btnDay || !btnMon) return;
            const on = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-indigo-600 shadow-sm';
            const off = 'px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500';
            btnDay.className = mode === 'daily' ? on : off;
            btnMon.className = mode === 'monthly' ? on : off;
            buildDashboardChart(window._dashboardUsers || [], mode);
        }

        function buildDashboardChart(users, mode) {
            const canvas = document.getElementById('followChart');
            if (!canvas) return;
            if (window._dashboardChartInstance) {
                window._dashboardChartInstance.destroy();
                window._dashboardChartInstance = null;
            }

            const labels = [], followData = [], unfollowData = [];
            const now = new Date();

            if (mode === 'daily') {
                for (let i = 29; i >= 0; i--) {
                    const d = new Date(now); d.setDate(d.getDate() - i); d.setHours(0, 0, 0, 0);
                    const next = new Date(d); next.setDate(next.getDate() + 1);
                    labels.push(`${d.getDate()}/${d.getMonth() + 1}`);
                    followData.push(users.filter(u => { const t = new Date(u.created_at); return t >= d && t < next && u.status === 'follow'; }).length);
                    unfollowData.push(users.filter(u => { const t = new Date(u.created_at); return t >= d && t < next && (u.status === 'block' || u.status === 'unfollow'); }).length);
                }
            } else {
                const MONTH_TH = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
                for (let i = 11; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
                    labels.push(MONTH_TH[d.getMonth()]);
                    followData.push(users.filter(u => { const t = new Date(u.created_at); return t >= d && t < next && u.status === 'follow'; }).length);
                    unfollowData.push(users.filter(u => { const t = new Date(u.created_at); return t >= d && t < next && (u.status === 'block' || u.status === 'unfollow'); }).length);
                }
            }

            window._dashboardChartInstance = new Chart(canvas.getContext('2d'), {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Follow', data: followData, backgroundColor: 'rgba(16,185,129,0.8)', borderColor: '#10b981', borderWidth: 2, borderRadius: 6 },
                        { label: 'Unfollow / Block', data: unfollowData, backgroundColor: 'rgba(244,63,94,0.7)', borderColor: '#f43f5e', borderWidth: 2, borderRadius: 6 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: 'rgba(15,23,42,0.92)', titleFont: { family: 'Outfit', size: 13, weight: '700' }, bodyFont: { family: 'Outfit', size: 12 }, padding: 12, cornerRadius: 12, callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} คน` } }
                    },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 10, family: 'Outfit' }, color: '#94a3b8', maxRotation: 45 } },
                        y: { grid: { color: 'rgba(148,163,184,0.12)', drawBorder: false }, ticks: { font: { size: 10, family: 'Outfit' }, color: '#94a3b8', precision: 0 }, beginAtZero: true }
                    }
                }
            });
        }

        function removeTag(hiddenId, index) {
            const hidden = document.getElementById(hiddenId);
            let tags = hidden.value.split(',').map(s => s.trim()).filter(Boolean);
            tags.splice(index, 1);
            hidden.value = tags.join(',');
            renderTags(hiddenId);
        }


        function processTagInput(inputEl, hiddenId) {
            let val = inputEl.value;
            val = val.replace(/[,]+$/, '').trim();
            if (val) {
                const hidden = document.getElementById(hiddenId);
                if (hidden) {
                    let tags = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
                    if (!tags.includes(val)) {
                        tags.push(val);
                        hidden.value = tags.join(',');
                        renderTags(hiddenId);
                    }
                }
            }
            inputEl.value = '';
        }

        function handleTagInput(e, hiddenId) {
            const val = e.target.value;
            if (val.includes(',')) {
                const parts = val.split(',');
                const lastPart = parts.pop();
                parts.forEach(part => {
                    const cleanPart = part.trim();
                    if (cleanPart) {
                        e.target.value = cleanPart;
                        processTagInput(e.target, hiddenId);
                    }
                });
                e.target.value = lastPart.trimStart();
            }
        }

        function handleTagKeyup(e, hiddenId) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                processTagInput(e.target, hiddenId);
            }
        }

        function handleTagKeydown(e, hiddenId) {
            // "Enter" on Android might be "Unidentified" or standard "Enter"
            if (e.key === 'Enter' || e.keyCode === 13 || e.key === ',') {
                e.preventDefault(); // Prevent form submit
                processTagInput(e.target, hiddenId);
            } else if (e.key === 'Backspace' && e.target.value === '') {
                const hidden = document.getElementById(hiddenId);
                if (hidden) {
                    let tags = hidden.value ? hidden.value.split(',').map(s => s.trim()).filter(Boolean) : [];
                    if (tags.length > 0) {
                        tags.pop();
                        hidden.value = tags.join(',');
                        renderTags(hiddenId);
                    }
                }
            }
        }

        function renderTags(hiddenId) {
            const hidden = document.getElementById(hiddenId);
            if (!hidden) return;
            const wrapperId = hiddenId.replace('-hidden', '-tags');
            const wrapper = document.getElementById(wrapperId);
            if (!wrapper) return;
            wrapper.innerHTML = '';
            const val = hidden.value.trim();
            if (!val) return;
            const tags = val.split(',').map(s => s.trim()).filter(Boolean);
            tags.forEach((tag, idx) => {
                const el = document.createElement('span');
                el.className = 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-sm font-medium bg-slate-600 text-white shadow-sm';
                el.innerHTML = `${escapeHtml(tag)} <button type="button" onclick="removeTag('${hiddenId}', ${idx})" class="p-0.5 hover:text-red-300 transition-colors focus:outline-none"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>`;
                wrapper.appendChild(el);
            });
            lucide.createIcons();
        }

        function openModal() {
            const overlay = document.getElementById('modal-overlay');
            const container = document.getElementById('modal-container');

            overlay.classList.remove('hidden');

            void overlay.offsetWidth;

            overlay.classList.remove('opacity-0');
            container.classList.remove('scale-95');
            container.classList.add('scale-100');
        }

        function updateContentPlaceholder(type) {
            const label = document.getElementById('contentLabel');
            const textarea = document.getElementById('contentTextarea');
            const input = document.getElementById('contentInput');

            textarea.classList.add('hidden'); input.classList.add('hidden');
            textarea.removeAttribute('required'); input.removeAttribute('required');

            if (type === 'text' || type === 'prompt') {
                label.innerText = type === 'text' ? 'ข้อความตอบกลับ' : 'คำสั่ง Prompt (System Instruction)';
                textarea.classList.remove('hidden'); textarea.setAttribute('required', 'true');
            } else if (type === 'flex' || type === 'template') {
                label.innerText = `JSON Code ของ ${type} `;
                textarea.classList.remove('hidden'); textarea.setAttribute('required', 'true');
                textarea.classList.add('json-editor');
            } else {
                label.innerText = 'URL ของรูปภาพ (https://...)';
                input.classList.remove('hidden'); input.setAttribute('required', 'true');
            }
        }

        function insertPlaceholder(placeholder) {
            const textarea = document.getElementById('contentTextarea');
            const input = document.getElementById('contentInput');
            const target = !textarea.classList.contains('hidden') ? textarea : input;

            if (target) {
                const start = target.selectionStart;
                const end = target.selectionEnd;
                const text = target.value;
                const before = text.substring(0, start);
                const after = text.substring(end, text.length);
                target.value = before + placeholder + after;
                target.selectionStart = target.selectionEnd = start + placeholder.length;
                target.focus();
            }
        }

        function setBtnLoading(btn, isLoading) {

                btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> กำลังบันทึก...`;
                lucide.createIcons();
            } else {
                btn.innerHTML = btn.dataset.originalContent || 'บันทึก';

        async function handleKeywordSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');

            const keywordInput = document.getElementById('keyword-input');
            const postbackInput = document.getElementById('postback-input');
            if (keywordInput && keywordInput.value.trim()) processTagInput(keywordInput, 'keyword-hidden');
            if (postbackInput && postbackInput.value.trim()) processTagInput(postbackInput, 'postback-hidden');

            const replyType = f.replyType.value;
            let content = (replyType === 'image') ? f.content_input.value : f.content.value;

            if (['flex', 'template'].includes(replyType)) {
                try { JSON.parse(content); } catch (err) { showToast('JSON ไม่ถูกต้อง', 'error'); return; }
            }

            if (!f.keyword.value.trim() && !f.reply_postback.value.trim()) {
                showToast('ต้องระบุ Keyword หรือ Postback อย่างน้อย 1 อย่าง', 'error'); return;
            }

            setBtnLoading(submitBtn, true);

            let richMenuId = f.reply_richmenu.value;
            if (richMenuId === 'CUSTOM_VALUE') {
                richMenuId = document.getElementById('manualRichMenuInput').value.trim();
            }

            const payload = {
                keyword: f.keyword.value.trim() || null,
                reply_postback: f.reply_postback.value.trim() || null,
                startdatetime: f.startdatetime.value || null,
                enddatetime: f.enddatetime.value || null,
                require_vip: f.require_vip.checked,
                reply_richmenu: richMenuId || null,
                reply_text: null, reply_image: null, reply_flex: null, reply_prompt: null, reply_template: null
            };

            payload[`reply_${replyType}`] = content;

            let error;
            if (editingKeywordId) {
                const { error: err } = await supabaseClient.from('keywords').update(payload).eq('id', editingKeywordId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('keywords').insert([payload]);
                error = err;
            }

            if (error) {
                showToast(error.message, 'error');
                setBtnLoading(submitBtn, false);
            }
            else {
                showToast('บันทึกสำเร็จ');
                closeModal();
                renderKeywordsTable();

            }
        }

        function formatThaiDateTime(isoString) {
            if (!isoString) return '-';
            if (!isoString.endsWith('Z') && !isoString.includes('+')) isoString += 'Z'; // Fallback to UTC assumption
            try {
                const date = new Date(isoString);
                return date.toLocaleString('th-TH', { timeZone: 'Asia/Bangkok', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return isoString; }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            let bgClass, icon, iconBg;
            let iconClass = "w-5 h-5";

            if (type === 'error') {
                bgClass = 'bg-white border-l-4 border-rose-500 text-rose-600';
                iconBg = 'bg-rose-100';
                icon = 'alert-circle';
            } else if (type === 'loading') {
                bgClass = 'bg-white border-l-4 border-indigo-500 text-indigo-600';
                iconBg = 'bg-indigo-100';
                icon = 'loader-2';
                iconClass += " animate-spin";
            } else {
                bgClass = 'bg-white border-l-4 border-emerald-500 text-emerald-600';
                iconBg = 'bg-emerald-100';
                icon = 'check-circle2';
            }

            toast.className = `${bgClass} shadow-2xl rounded-xl px-5 py-4 flex items-center gap-3 toast-enter min-w-[300px] border border-gray-100/50 backdrop-blur-3xl`;
            toast.innerHTML = `
                    <div class="${iconBg} p-2 rounded-full" >
                        <i data-lucide="${icon}" class="${iconClass}"></i>
                </div>
                    <span class="font-semibold text-sm text-slate-700">${message}</span>
                `;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() => { toast.classList.add('toast-enter-active'); toast.classList.remove('toast-enter'); });



            setTimeout(() => {
                toast.classList.add('toast-exit-active');
                toast.addEventListener('transitionend', () => toast.remove());
            }, 3000);
        }

            try {

                const { data, error } = await supabaseClient.functions.invoke('sync-rich-menus', {

                if (data.error) throw new Error(data.error);

                btn.innerHTML = originalContent;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        async function deleteRichMenu(id) {
            if (!confirm('ยืนยันลบ Rich Menu นี้? (ระบบจะลบออกจาก LINE ด้วย)')) return;

            showToast('กำลังลบจาก LINE...', 'loading');


            const { data: menu, error: fetchError } = await supabaseClient.from('rich_menus').select('rich_menu_id').eq('id', id).single();
            if (fetchError) {
                showToast('ไม่พบข้อมูล: ' + fetchError.message, 'error');
                return;
            }

            try {

                const { data: funcData, error: funcError } = await supabaseClient.functions.invoke('sync-rich-menus', {
                    body: { action: 'delete', richMenuId: menu.rich_menu_id }
                });

                if (funcError) throw funcError;
                if (funcData && funcData.error) throw new Error(funcData.error);


                const { error: deleteError } = await supabaseClient.from('rich_menus').delete().eq('id', id);
                if (deleteError) throw deleteError;

                showToast('ลบข้อมูลเรียบร้อย');
                renderRichMenusTable();

            } catch (err) {
                console.error(err);
                showToast('ลบไม่สำเร็จ: ' + err.message, 'error');
            }
        }

        async function handleRichMenuSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');
            setBtnLoading(submitBtn, true);

            const payload = {
                name: f.name.value.trim(),
                rich_menu_id: f.rich_menu_id.value.trim(),
                image_url: f.image_url.value.trim() || null,
                description: f.description.value.trim() || null
            };

            let error;
            if (editingRichMenuId) {
                const { error: err } = await supabaseClient.from('rich_menus').update(payload).eq('id', editingRichMenuId);
                error = err;
            } else {
                const { error: err } = await supabaseClient.from('rich_menus').insert([payload]);
                error = err;
            }

            if (error) { showToast(error.message, 'error'); setBtnLoading(submitBtn, false); }
            else { showToast('บันทึกสำเร็จ'); closeModal(); renderRichMenusTable(); }
        }

        async function handleTierSubmit(e) {
            e.preventDefault();
            const f = e.target;

            const selectedColor = f.querySelector('input[name="color_theme"]:checked');
            const payload = {
                name: f.name.value.trim(),
                min_points: parseInt(f.min_points.value),
                color_theme: selectedColor ? selectedColor.value : 'bg-slate-400'
            };
            const submitBtn = f.querySelector('button[type="submit"]');
            setBtnLoading(submitBtn, true);
            let error;
            if (editingTierId) error = (await supabaseClient.from('tiers').update(payload).eq('id', editingTierId)).error;
            else error = (await supabaseClient.from('tiers').insert([payload])).error;

            if (error) { showToast(error.message, 'error'); setBtnLoading(submitBtn, false); }
            else { showToast('บันทึก Level สำเร็จ! 🎉'); closeModal(); renderTiersTable(); }
        }

        async function deleteTier(id) {
            if (!confirm('ยืนยันลบ Level นี้? ข้อมูลสมาชิกที่อยู่ใน Level นี้จะไม่ได้รับผลกระทบ')) return;
            const { error } = await supabaseClient.from('tiers').delete().eq('id', id);
            if (error) showToast(error.message, 'error');
            else { showToast('ลบ Level สำเร็จ'); renderTiersTable(); }
        }

        async function renderSegmentMatches(maxPoints, inactiveDays) {
            const listEl = document.getElementById('seg-match-list');
            const countEl = document.getElementById('seg-match-count');

            if (!listEl) return;

            listEl.innerHTML = '<div class="text-center text-xs text-slate-400 py-4"><i data-lucide="loader-2" class="w-4 h-4 animate-spin inline-block mx-auto"></i> กำลังเปรียบเทียบเงื่อนไข...</div>';
            if (window.lucide) lucide.createIcons();

            let query = supabaseClient.from('user_profiles').select('displayName, pictureUrl, points, last_activity').order('last_activity', { ascending: false });

            if (maxPoints !== null && maxPoints !== '') {
                query = query.lte('points', parseInt(maxPoints));
            }

            if (inactiveDays !== null && inactiveDays !== '') {
                const limitDate = new Date();
                limitDate.setDate(limitDate.getDate() - parseInt(inactiveDays));
                query = query.or(`last_activity.lt.${limitDate.toISOString()},last_activity.is.null`);
            }

            const { data: users, error } = await query;

            if (error) {
                listEl.innerHTML = `<div class="text-center text-xs text-rose-500 py-4">เกิดข้อผิดพลาด: ${error.message}</div>`;
                countEl.innerText = 'Error';
                return;
            }

            countEl.innerText = `${users.length} คน`;

            if (users.length === 0) {
                listEl.innerHTML = '<div class="text-center text-xs text-slate-400 py-4">ไม่พบลูกค้าที่เข้าเงื่อนไขนี้</div>';
            } else {
                listEl.innerHTML = users.map(u => {
                    let pts = u.points || 0;
                    return `
                    <div class="flex items-center justify-between p-2 bg-white rounded-md border border-slate-100 shadow-sm">
                        <div class="flex items-center gap-2">
                            <img src="${u.pictureUrl || 'https://cdn-icons-png.flaticon.com/128/1144/1144760.png'}" class="w-7 h-7 rounded-full object-cover" />
                            <div class="flex flex-col">

                            </div>

                        <div class="flex items-center gap-1.5 text-[10px] text-slate-500">
                            <span class="bg-amber-50 text-amber-600 px-1.5 py-0.5 rounded font-bold flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i> ${pts.toLocaleString()}</span>
                        </div>
                    </div>
                    `;
                }).join('');
                if (window.lucide) lucide.createIcons();
            }
        }

                                        <label class="cursor-pointer group">
                                            <input type="radio" name="msgType" value="image" class="peer hidden" onchange="updateBroadcastContent(this.value)" />
                                            <div class="text-center p-4 rounded-2xl border-2 border-slate-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-600 transition-all font-bold text-xs bg-white shadow-sm group-hover:border-slate-300">Image URL</div>
                                        </label>
                                        <label class="cursor-pointer group">
                                            <input type="radio" name="msgType" value="flex" class="peer hidden" onchange="updateBroadcastContent(this.value)" />
                                            <div class="text-center p-4 rounded-2xl border-2 border-slate-200 peer-checked:border-indigo-600 peer-checked:bg-indigo-50 peer-checked:text-indigo-600 transition-all font-bold text-xs bg-white shadow-sm group-hover:border-slate-300">Flex JSON</div>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-6 flex flex-col justify-center">
                                <div id="bc-text-area">
                                    <label class="block text-sm font-bold text-slate-700 mb-2.5 font-display flex items-center gap-2">
                                        <i data-lucide="align-left" class="w-4 h-4 text-slate-400"></i> ข้อความที่ต้องการส่ง
                                    </label>
                                    <textarea name="message" id="bc-text-input" rows="8" class="w-full rounded-3xl border-slate-200 border p-5 focus:ring-2 focus:ring-indigo-500 bg-white shadow-inner outline-none transition-all focus:bg-slate-50/30" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                                </div>
                                <div id="bc-image-area" class="hidden">
                                    <label class="block text-sm font-bold text-slate-700 mb-2.5 font-display flex items-center gap-2">
                                        <i data-lucide="image" class="w-4 h-4 text-slate-400"></i> URL รูปภาพ
                                    </label>
                                    <input type="text" name="imageUrl" id="bc-image-input" class="w-full rounded-2xl border-slate-200 border p-5 focus:ring-2 focus:ring-indigo-500 bg-white outline-none shadow-sm" placeholder="https://..." />
                                    <p class="text-[10px] text-slate-400 mt-3 italic">** รูปภาพต้องเป็น HTTPS และรองรับ Direct Link</p>
                                </div>
                                <div id="bc-flex-area" class="hidden">
                                     <label class="block text-sm font-bold text-slate-700 mb-2.5 font-display flex items-center gap-2">
                                        <i data-lucide="code" class="w-4 h-4 text-slate-400"></i> Flex Message JSON
                                     </label>
                                     <textarea name="flexJson" id="bc-flex-input" rows="8" class="w-full rounded-3xl border-slate-200 border p-5 focus:ring-4 focus:ring-indigo-500/10 bg-slate-900 text-indigo-300   text-xs shadow-2xl" placeholder="{ ... }"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col items-center gap-6 pt-10 border-t border-slate-100">
                            <button type="submit" class="w-full md:w-80 py-4 md:py-5 bg-gradient-to-br from-indigo-600 to-violet-700 text-white rounded-[1.5rem] font-bold shadow-2xl shadow-indigo-200 hover:shadow-indigo-300 transition-all active:scale-95 flex items-center justify-center gap-3 text-lg group">
                                <i data-lucide="send" class="w-6 h-6 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i> เริ่มส่งบรอดแคสต์
                            </button>
                            <div class="flex items-center gap-2 text-xs text-slate-400 font-medium">
                                <i data-lucide="shield-check" class="w-4 h-4 text-emerald-500"></i>
                                ส่งข้อมูลผ่านระบบรักษาความปลอดภัยยีนยันโดย LINE Official
                            </div>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
            lucide.createIcons();
            document.getElementById('broadcastForm').onsubmit = handleBroadcastSubmit;

            // Fetch Quota
            fetchQuota();
        }

        function toggleBcUsersArea(val) {
            const area = document.getElementById('target-users-area');
            if (val === 'users') area.classList.remove('hidden');
            else area.classList.add('hidden');
        }

        function filterBcUsers(term) {
            const lower = term.toLowerCase();
            document.querySelectorAll('.bc-user-item').forEach(el => {
                const name = el.querySelector('.bc-user-name').innerText.toLowerCase();
                if (name.includes(lower)) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        }

        async function fetchQuota() {
            try {
                const { data, error } = await supabaseClient.functions.invoke('line-webhook', {
                    body: { action: 'get_quota' }
                });

                if (error) throw error;
                const display = document.getElementById('line-quota-display');
                if (data.totalUsage !== undefined) {
                    let text = data.totalUsage.toLocaleString();
                    if (data.type !== 'none' && data.value) {
                        text = `${text} / ${data.value.toLocaleString()}`;
                    }
                    display.innerText = text + ' ข้อความ';
                } else {
                    display.innerText = 'ไม่สามารถดึงข้อมูลได้';
                }
            } catch (err) {
                console.error("Quota fetch err:", err);
                document.getElementById('line-quota-display').innerText = 'Error';
            }
        }

        function updateBroadcastContent(type) {
            document.getElementById('bc-text-area').classList.add('hidden');
            document.getElementById('bc-image-area').classList.add('hidden');
            document.getElementById('bc-flex-area').classList.add('hidden');

            if (type === 'text') document.getElementById('bc-text-area').classList.remove('hidden');
            else if (type === 'image') document.getElementById('bc-image-area').classList.remove('hidden');
            else if (type === 'flex') document.getElementById('bc-flex-area').classList.remove('hidden');
        }

        async function handleBroadcastSubmit(e) {
            e.preventDefault();
            const f = e.target;
            const submitBtn = f.querySelector('button[type="submit"]');

            if (!confirm('ยืนยันการส่งบรอดแคสต์หาลูกค้ากลุ่มเป้าหมาย?')) return;

            setBtnLoading(submitBtn, true);
            showToast('กำลังส่งข้อมูลบรอดแคสต์...', 'loading');

            const payload = {
                action: 'broadcast',
                target: f.target.value,
                msgType: f.msgType.value,
                message: f.message.value,
                imageUrl: f.imageUrl.value,
                flexJson: f.flexJson.value
            };

            if (f.target.value === 'users') {
                const checkboxes = f.querySelectorAll('input[name="targetUserIds"]:checked');
                payload.targetUserIds = Array.from(checkboxes).map(c => c.value);
                if (payload.targetUserIds.length === 0) {
                    showToast('กรุณาเลือกลูกค้าเป้าหมาย', 'error');
                    setBtnLoading(submitBtn, false);
                    return;
                }
            }

            try {
                const { data: result, error } = await supabaseClient.functions.invoke('line-webhook', {
                    body: payload
                });

                if (error) throw error;
                if (result.success) {
                    showToast('ส่งบรอดแคสต์เรียบร้อยแล้ว!');
                } else {
                    showToast(result.message || 'ส่งล้มเหลว', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            } finally {
                setBtnLoading(submitBtn, false);
            }
        }

    </script>
</body>

</html>
